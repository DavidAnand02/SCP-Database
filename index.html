    <script>
      // Anti-scraping measures
      console.log("%cSTOP!", "color: red; font-family: sans-serif; font-size: 4.5em; font-weight: bolder; text-shadow: #000 1px 1px;");
      console.log("%cThis is a Foundation-restricted terminal. Unauthorized scraping or data extraction is a violation of Security Protocol 4012-A.", "font-size: 1.5em;");
      console.log("%cMemetic kill agent activated for unauthorized crawlers.", "color: #b91c1c; font-style: italic;");

      document.addEventListener('contextmenu', event => event.preventDefault());
      document.addEventListener('keydown', event => {
        if (event.ctrlKey && (event.key === 'u' || event.key === 's' || event.key === 'i' || event.key === 'j')) {
          event.preventDefault();
        }
        if (event.key === 'F12') {
          event.preventDefault();
        }
      });
      
      // Guard against libraries or extensions trying to redefine window.fetch
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { 
              console.warn('Attempt to redefine window.fetch blocked.');
            },
            configurable: true
          });
        } catch (e) {
          console.error('Failed to set fetch guard:', e);
        }
      })();
    </script>
